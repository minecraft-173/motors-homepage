<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大石モータース</title>

<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'M PLUS Rounded 1c', sans-serif;
background:#FFF4E6;
color:#4A2E1F;
}

/* ヘッダー */

header{
background:#FF7A00;
color:white;
padding:20px;
text-align:center;
}

nav{
margin-top:10px;
}

nav a{
color:white;
margin:0 10px;
text-decoration:none;
font-weight:bold;
}

/* メイン */

.hero{
text-align:center;
padding:80px 20px;
background:linear-gradient(135deg,#FF9A76,#FFD84D);
color:white;
}

.button{
display:inline-block;
margin-top:20px;
padding:12px 30px;
background:white;
color:#FF7A00;
border-radius:30px;
font-weight:bold;
text-decoration:none;
}

/* サービス */

.services{
padding:60px 20px;
text-align:center;
}

.service-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
max-width:900px;
margin:auto;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

/* 店舗情報 */

.info{
background:#FFE0CC;
padding:40px;
text-align:center;
}

/* フッター */

footer{
background:#FF7A00;
color:white;
text-align:center;
padding:20px;
}

</style>
</head>

<body>

<header>
<h1>🚗 大石モータース</h1>

<nav>
<a href="#">ホーム</a>
<a href="#">サービス</a>
<a href="#">車検</a>
<a href="#">中古車</a>
<a href="#">会社案内</a>
<a href="#">お問い合わせ</a>
</nav>

</header>

<section class="hero">

<h2>地域のカーライフをサポート！</h2>

<p>車検・修理・中古車なら大石モータースへ</p>

<a class="button" href="#">お問い合わせ</a>

</section>

<section class="services">

<h2>サービス</h2>

<div class="service-grid">

<div class="card">
<h3>🔧 車検</h3>
<p>安心・丁寧な車検サービス</p>
</div>

<div class="card">
<h3>🚗 中古車販売</h3>
<p>良質な中古車を取り揃えています</p>
</div>

<div class="card">
<h3>🛠 修理</h3>
<p>小さな修理から対応します</p>
</div>

<div class="card">
<h3>🛞 タイヤ交換</h3>
<p>季節のタイヤ交換もお任せ</p>
</div>

</div>

</section>

<section class="info">

<h2>店舗情報</h2>

<p>📍 住所：〇〇県〇〇市</p>
<p>📞 電話：000-0000-0000</p>
<p>⏰ 営業時間：9:00〜18:00</p>

</section>

<footer>

<p>© 2026 大石モータース</p>

</footer>

</body>
</html>
